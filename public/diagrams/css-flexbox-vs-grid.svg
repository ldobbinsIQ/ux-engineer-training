<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 280" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="280" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Flexbox vs CSS Grid: When to Use Which</text>

  <!-- Flexbox section -->
  <rect x="20" y="45" width="370" height="210" rx="10" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="205" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#1d4ed8">Flexbox — One direction at a time</text>

  <!-- Flexbox row example -->
  <text x="40" y="90" font-size="10" fill="#1d4ed8">display: flex  (row direction)</text>
  <rect x="40" y="98" width="330" height="50" rx="6" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="50" y="108" width="60" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="80" y="127" text-anchor="middle" font-size="10" fill="#1d4ed8">Item</text>
  <rect x="120" y="108" width="80" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="160" y="127" text-anchor="middle" font-size="10" fill="#1d4ed8">Longer Item</text>
  <rect x="210" y="108" width="55" height="30" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="237" y="127" text-anchor="middle" font-size="10" fill="#1d4ed8">Item</text>

  <!-- Flexbox column example -->
  <text x="40" y="168" font-size="10" fill="#1d4ed8">flex-direction: column</text>
  <rect x="40" y="176" width="330" height="68" rx="6" fill="white" stroke="#bfdbfe" stroke-width="1"/>
  <rect x="50" y="184" width="200" height="18" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="60" y="196" font-size="10" fill="#1d4ed8">Nav Item One</text>
  <rect x="50" y="206" width="200" height="18" rx="4" fill="#3b82f6" opacity="0.3"/>
  <text x="60" y="218" font-size="10" fill="#1d4ed8">Nav Item Two</text>
  <rect x="50" y="228" width="200" height="8" rx="4" fill="#3b82f6" opacity="0.15"/>

  <text x="205" y="255" text-anchor="middle" font-size="10" fill="#1d4ed8">Best for: nav bars, button groups, card rows, centering</text>

  <!-- Grid section -->
  <rect x="410" y="45" width="370" height="210" rx="10" fill="#10b981" opacity="0.06" stroke="#10b981" stroke-width="1.5"/>
  <text x="595" y="68" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">CSS Grid — Two dimensions at once</text>

  <text x="430" y="90" font-size="10" fill="#065f46">grid-template-columns: repeat(3, 1fr)</text>
  <rect x="430" y="98" width="330" height="140" rx="6" fill="white" stroke="#a7f3d0" stroke-width="1"/>

  <!-- Grid cells -->
  <rect x="440" y="108" width="96" height="55" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="488" y="139" text-anchor="middle" font-size="10" fill="#065f46">1</text>
  <rect x="544" y="108" width="96" height="55" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="592" y="139" text-anchor="middle" font-size="10" fill="#065f46">2</text>
  <rect x="648" y="108" width="96" height="55" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="696" y="139" text-anchor="middle" font-size="10" fill="#065f46">3</text>

  <!-- Spanning cell -->
  <rect x="440" y="171" width="200" height="55" rx="4" fill="#10b981" opacity="0.35" stroke="#10b981" stroke-width="1"/>
  <text x="540" y="192" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">4 (spans 2 cols)</text>
  <text x="540" y="206" text-anchor="middle" font-size="9" fill="#065f46">grid-column: span 2</text>
  <rect x="648" y="171" width="96" height="55" rx="4" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="696" y="202" text-anchor="middle" font-size="10" fill="#065f46">5</text>

  <text x="595" y="255" text-anchor="middle" font-size="10" fill="#065f46">Best for: page layouts, card grids, dashboards, galleries</text>
</svg>
