<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowGray" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="32" font-family="system-ui, sans-serif" font-size="19" font-weight="700" fill="#1e293b" text-anchor="middle">DOM + CSSOM → Render Tree</text>

  <!-- ===== DOM Tree (left column) ===== -->
  <text x="130" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#3b82f6" text-anchor="middle">DOM Tree</text>

  <!-- html -->
  <rect x="80" y="78" width="100" height="30" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="130" y="97" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">&lt;html&gt;</text>

  <!-- html → body line -->
  <line x1="130" y1="108" x2="130" y2="120" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="90" y1="120" x2="170" y2="120" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- head -->
  <rect x="40" y="120" width="90" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="85" y="138" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">&lt;head&gt;</text>
  <line x1="85" y1="120" x2="85" y2="120" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- body -->
  <rect x="140" y="120" width="90" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="185" y="138" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">&lt;body&gt;</text>

  <!-- body children line -->
  <line x1="185" y1="148" x2="185" y2="162" stroke="#3b82f6" stroke-width="1.5"/>
  <line x1="155" y1="162" x2="215" y2="162" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- h1 -->
  <rect x="135" y="162" width="70" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="170" y="180" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">&lt;h1&gt;</text>

  <!-- div -->
  <rect x="185" y="200" width="60" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="215" y="218" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">&lt;div&gt;</text>
  <line x1="185" y1="162" x2="215" y2="200" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- p -->
  <rect x="155" y="240" width="60" height="28" rx="5" fill="#dbeafe" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="185" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">&lt;p&gt;</text>
  <line x1="215" y1="228" x2="185" y2="240" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- span display:none -->
  <rect x="200" y="240" width="80" height="28" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="240" y="258" font-family="system-ui, sans-serif" font-size="11" fill="#ef4444" text-anchor="middle">&lt;span&gt;</text>
  <line x1="215" y1="228" x2="240" y2="240" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="240" y="278" font-family="system-ui, sans-serif" font-size="9" fill="#ef4444" text-anchor="middle">display:none</text>

  <!-- ===== CSSOM Tree (middle column) ===== -->
  <text x="440" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#8b5cf6" text-anchor="middle">CSSOM Tree</text>

  <rect x="390" y="78" width="100" height="30" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="440" y="97" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">:root styles</text>

  <line x1="440" y1="108" x2="440" y2="122" stroke="#8b5cf6" stroke-width="1.5"/>
  <line x1="400" y1="122" x2="480" y2="122" stroke="#8b5cf6" stroke-width="1.5"/>

  <rect x="360" y="122" width="80" height="28" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">body { … }</text>

  <rect x="450" y="122" width="80" height="28" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="490" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">h1 { … }</text>

  <line x1="400" y1="150" x2="400" y2="164" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="360" y="164" width="80" height="28" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="182" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">div { … }</text>

  <line x1="400" y1="192" x2="400" y2="206" stroke="#8b5cf6" stroke-width="1.5"/>
  <rect x="360" y="206" width="80" height="28" rx="5" fill="#ede9fe" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="224" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">p { … }</text>

  <rect x="450" y="206" width="80" height="28" rx="5" fill="#fee2e2" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="490" y="224" font-family="system-ui, sans-serif" font-size="10" fill="#ef4444" text-anchor="middle">span{none}</text>

  <!-- ===== Render Tree (right column) ===== -->
  <text x="680" y="68" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#22c55e" text-anchor="middle">Render Tree</text>

  <rect x="630" y="78" width="100" height="30" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="680" y="97" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">body</text>

  <line x1="680" y1="108" x2="680" y2="122" stroke="#22c55e" stroke-width="1.5"/>
  <line x1="650" y1="122" x2="710" y2="122" stroke="#22c55e" stroke-width="1.5"/>

  <rect x="620" y="122" width="60" height="28" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="650" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">h1</text>

  <rect x="690" y="122" width="60" height="28" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="140" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">div</text>

  <line x1="720" y1="150" x2="720" y2="164" stroke="#22c55e" stroke-width="1.5"/>
  <rect x="690" y="164" width="60" height="28" rx="5" fill="#dcfce7" stroke="#22c55e" stroke-width="1.5"/>
  <text x="720" y="182" font-family="system-ui, sans-serif" font-size="11" fill="#1e293b" text-anchor="middle">p</text>

  <!-- Crossed-out span (excluded) -->
  <rect x="630" y="164" width="55" height="28" rx="5" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="658" y="182" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">span</text>
  <line x1="630" y1="164" x2="685" y2="192" stroke="#ef4444" stroke-width="2"/>
  <line x1="685" y1="164" x2="630" y2="192" stroke="#ef4444" stroke-width="2"/>
  <text x="658" y="205" font-family="system-ui, sans-serif" font-size="8" fill="#ef4444" text-anchor="middle">excluded</text>

  <!-- Paint box -->
  <rect x="630" y="300" width="100" height="36" rx="8" fill="#fbbf24" stroke="#d97706" stroke-width="2"/>
  <text x="680" y="322" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Paint</text>
  <line x1="680" y1="230" x2="680" y2="298" stroke="#22c55e" stroke-width="2" marker-end="url(#arrowGray)"/>

  <!-- Converging arrows from DOM and CSSOM to Render Tree -->
  <line x1="285" y1="180" x2="370" y2="180" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)"/>
  <line x1="510" y1="180" x2="570" y2="180" stroke="#8b5cf6" stroke-width="2"/>
  <polygon points="570,175 590,180 570,185" fill="#8b5cf6"/>

  <!-- + sign between -->
  <text x="555" y="186" font-family="system-ui, sans-serif" font-size="18" font-weight="700" fill="#6b7280" text-anchor="middle">→</text>
</svg>
