<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrowBlue" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">Next.js Server vs Client Components</text>

  <!-- Server region (left, light blue) -->
  <rect x="20" y="54" width="340" height="310" rx="14" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="190" y="82" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">Server</text>

  <!-- Server boxes -->
  <rect x="44" y="96" width="292" height="46" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="118" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">page.tsx (async)</text>
  <text x="190" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Server Component, async/await data fetch</text>

  <rect x="44" y="154" width="292" height="46" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="176" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">layout.tsx</text>
  <text x="190" y="193" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Shared shell, nav, metadata</text>

  <rect x="44" y="212" width="292" height="46" rx="8" fill="#ffffff" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="190" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">data fetch</text>
  <text x="190" y="251" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">fetch(), DB queries, never hits browser</text>

  <rect x="44" y="270" width="292" height="46" rx="8" fill="#f1f5f9" stroke="#e2e8f0" stroke-width="1.5"/>
  <text x="190" y="294" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">No useState / useEffect</text>
  <text x="190" y="310" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">No browser APIs — runs only on server</text>

  <!-- Dashed boundary line -->
  <line x1="400" y1="54" x2="400" y2="364" stroke="#6b7280" stroke-width="2" stroke-dasharray="8,5"/>
  <text x="400" y="386" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Rendering Boundary</text>

  <!-- Client region (right, light green) -->
  <rect x="440" y="54" width="340" height="310" rx="14" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="610" y="82" font-family="system-ui, sans-serif" font-size="16" font-weight="700" fill="#1e293b" text-anchor="middle">Client / Browser</text>

  <!-- Client boxes -->
  <rect x="464" y="96" width="292" height="46" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="118" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#22c55e" text-anchor="middle">'use client'</text>
  <text x="610" y="135" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Directive that opts into client rendering</text>

  <rect x="464" y="154" width="292" height="46" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="176" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">useState</text>
  <text x="610" y="193" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Local reactive state management</text>

  <rect x="464" y="212" width="292" height="46" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="234" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">useEffect</text>
  <text x="610" y="251" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Side effects, subscriptions, timers</text>

  <rect x="464" y="270" width="292" height="46" rx="8" fill="#ffffff" stroke="#22c55e" stroke-width="1.5"/>
  <text x="610" y="292" font-family="system-ui, sans-serif" font-size="13" font-weight="600" fill="#1e293b" text-anchor="middle">event handlers</text>
  <text x="610" y="309" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">onClick, onChange, form submit</text>

  <!-- Data props arrow crossing boundary -->
  <line x1="336" y1="234" x2="460" y2="234" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowBlue)" stroke-dasharray="6,3"/>
  <text x="398" y="225" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6" text-anchor="middle">data props</text>
</svg>
