<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#6b7280"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">Design to Code Translation</text>

  <!-- Stage 1: Figma Spec (light blue) -->
  <rect x="20" y="100" width="130" height="160" rx="8" fill="#dbeafe" stroke="#3b82f6" stroke-width="2"/>
  <text x="85" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Figma</text>
  <text x="85" y="144" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Spec</text>
  <text x="85" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Colors, type,</text>
  <text x="85" y="186" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">spacing, layout,</text>
  <text x="85" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">components,</text>
  <text x="85" y="214" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">interactions</text>

  <!-- Arrow 1 -->
  <line x1="152" y1="180" x2="172" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 2: Component Inventory (light green) -->
  <rect x="175" y="100" width="130" height="160" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <text x="240" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Component</text>
  <text x="240" y="144" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Inventory</text>
  <text x="240" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">List all UI parts,</text>
  <text x="240" y="186" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">identify reusable</text>
  <text x="240" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">pieces, define</text>
  <text x="240" y="214" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">hierarchy</text>

  <!-- Arrow 2 -->
  <line x1="307" y1="180" x2="327" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 3: State Inventory (light orange) -->
  <rect x="330" y="100" width="130" height="160" rx="8" fill="#ffedd5" stroke="#f97316" stroke-width="2"/>
  <text x="395" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">State</text>
  <text x="395" y="144" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Inventory</text>
  <text x="395" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">What changes?</text>
  <text x="395" y="186" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Where does it</text>
  <text x="395" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">live? Local vs</text>
  <text x="395" y="214" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">global state</text>

  <!-- Arrow 3 -->
  <line x1="462" y1="180" x2="482" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 4: Data Flow (light purple) -->
  <rect x="485" y="100" width="130" height="160" rx="8" fill="#ede9fe" stroke="#8b5cf6" stroke-width="2"/>
  <text x="550" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Data</text>
  <text x="550" y="144" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#1e293b" text-anchor="middle">Flow</text>
  <text x="550" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">Props, events,</text>
  <text x="550" y="186" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">API calls, data</text>
  <text x="550" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">sources, async</text>
  <text x="550" y="214" font-family="system-ui, sans-serif" font-size="10" fill="#6b7280" text-anchor="middle">patterns</text>

  <!-- Arrow 4 -->
  <line x1="617" y1="180" x2="637" y2="180" stroke="#6b7280" stroke-width="2" marker-end="url(#arrow)"/>

  <!-- Stage 5: Build (green) -->
  <rect x="640" y="100" width="130" height="160" rx="8" fill="#22c55e" stroke="#16a34a" stroke-width="2"/>
  <text x="705" y="128" font-family="system-ui, sans-serif" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">Build</text>
  <text x="705" y="158" font-family="system-ui, sans-serif" font-size="10" fill="#f0fdf4" text-anchor="middle">Write components,</text>
  <text x="705" y="172" font-family="system-ui, sans-serif" font-size="10" fill="#f0fdf4" text-anchor="middle">wire up state,</text>
  <text x="705" y="186" font-family="system-ui, sans-serif" font-size="10" fill="#f0fdf4" text-anchor="middle">apply styles,</text>
  <text x="705" y="200" font-family="system-ui, sans-serif" font-size="10" fill="#f0fdf4" text-anchor="middle">test &amp; iterate</text>

  <!-- Step numbers -->
  <circle cx="85" cy="290" r="12" fill="#3b82f6"/>
  <text x="85" y="294" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <circle cx="240" cy="290" r="12" fill="#22c55e"/>
  <text x="240" y="294" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <circle cx="395" cy="290" r="12" fill="#f97316"/>
  <text x="395" y="294" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <circle cx="550" cy="290" r="12" fill="#8b5cf6"/>
  <text x="550" y="294" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <circle cx="705" cy="290" r="12" fill="#16a34a"/>
  <text x="705" y="294" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
</svg>
