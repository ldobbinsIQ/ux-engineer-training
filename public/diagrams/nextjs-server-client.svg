<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 300" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="300" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Next.js App Router: Server vs Client Components</text>

  <!-- Server side -->
  <rect x="20" y="50" width="360" height="220" rx="10" fill="#3b82f6" opacity="0.06" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="200" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">SERVER (Node.js)</text>
  <text x="200" y="88" text-anchor="middle" font-size="10" fill="#3b82f6">Runs at request time, never in browser</text>

  <!-- Server components -->
  <rect x="40" y="100" width="150" height="44" rx="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="115" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">page.tsx</text>
  <text x="115" y="133" text-anchor="middle" font-size="10" fill="#1d4ed8">Server Component</text>

  <rect x="210" y="100" width="150" height="44" rx="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="285" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">layout.tsx</text>
  <text x="285" y="133" text-anchor="middle" font-size="10" fill="#1d4ed8">Server Component</text>

  <!-- DB / Files -->
  <rect x="80" y="175" width="240" height="44" rx="8" fill="#64748b" opacity="0.1" stroke="#64748b" stroke-width="1.5"/>
  <text x="200" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Direct Data Access</text>
  <text x="200" y="209" text-anchor="middle" font-size="10" fill="#475569">fs.readFile, fetch(), database queries</text>

  <line x1="115" y1="144" x2="200" y2="175" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="285" y1="144" x2="200" y2="175" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Client side -->
  <rect x="420" y="50" width="360" height="220" rx="10" fill="#10b981" opacity="0.06" stroke="#10b981" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="600" y="72" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">BROWSER (Client)</text>
  <text x="600" y="88" text-anchor="middle" font-size="10" fill="#10b981">Runs in the user's browser, has interactivity</text>

  <!-- Client components -->
  <rect x="440" y="100" width="150" height="44" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <text x="515" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">SearchBar.tsx</text>
  <text x="515" y="133" text-anchor="middle" font-size="10" fill="#065f46">"use client"</text>

  <rect x="610" y="100" width="150" height="44" rx="8" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1.5"/>
  <text x="685" y="118" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">TaskChecklist.tsx</text>
  <text x="685" y="133" text-anchor="middle" font-size="10" fill="#065f46">"use client"</text>

  <!-- Browser APIs -->
  <rect x="480" y="175" width="240" height="44" rx="8" fill="#64748b" opacity="0.1" stroke="#64748b" stroke-width="1.5"/>
  <text x="600" y="193" text-anchor="middle" font-size="11" font-weight="600" fill="#475569">Browser APIs Only</text>
  <text x="600" y="209" text-anchor="middle" font-size="10" fill="#475569">useState, useEffect, localStorage, window</text>

  <line x1="515" y1="144" x2="600" y2="175" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>
  <line x1="685" y1="144" x2="600" y2="175" stroke="#64748b" stroke-width="1" stroke-dasharray="3,2"/>

  <!-- Boundary arrow -->
  <line x1="390" y1="160" x2="420" y2="160" stroke="#f59e0b" stroke-width="2.5" marker-end="url(#yellowarrow)"/>
  <text x="405" y="148" text-anchor="middle" font-size="9" fill="#b45309">HTML</text>

  <!-- Rule box -->
  <rect x="240" y="270" width="320" height="22" rx="4" fill="#f1f5f9"/>
  <text x="400" y="285" text-anchor="middle" font-size="10" fill="#475569">Server components CAN render client components as children — not vice versa</text>

  <defs>
    <marker id="yellowarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#f59e0b"/>
    </marker>
  </defs>
</svg>
