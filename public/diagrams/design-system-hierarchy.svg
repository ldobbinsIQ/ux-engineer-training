<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="320" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Design System Hierarchy: Tokens → Components → Patterns</text>

  <!-- Layer 1: Tokens (bottom) -->
  <rect x="20" y="240" width="760" height="60" rx="10" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="400" y="264" text-anchor="middle" font-size="13" font-weight="700" fill="#b45309">Design Tokens</text>
  <text x="400" y="283" text-anchor="middle" font-size="10" fill="#b45309">--color-primary: #3b82f6  •  --space-4: 16px  •  --font-size-base: 16px  •  --radius-md: 8px  •  --shadow-sm: 0 1px 3px...</text>

  <!-- Layer 2: Components -->
  <rect x="20" y="155" width="760" height="70" rx="10" fill="#8b5cf6" opacity="0.12" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" font-size="13" font-weight="700" fill="#6d28d9">Components  (consume tokens)</text>
  <!-- Component boxes -->
  <rect x="40" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="80" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Button</text>
  <rect x="135" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="175" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Input</text>
  <rect x="230" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="270" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Card</text>
  <rect x="325" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="365" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Modal</text>
  <rect x="420" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="460" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Badge</text>
  <rect x="515" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="555" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Toast</text>
  <rect x="610" y="188" width="80" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="650" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Select</text>
  <rect x="705" y="188" width="55" height="28" rx="5" fill="#8b5cf6" opacity="0.2" stroke="#8b5cf6" stroke-width="1"/>
  <text x="732" y="207" text-anchor="middle" font-size="10" font-weight="600" fill="#6d28d9">Tabs</text>

  <!-- Layer 3: Patterns -->
  <rect x="20" y="70" width="760" height="70" rx="10" fill="#10b981" opacity="0.12" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="93" text-anchor="middle" font-size="13" font-weight="700" fill="#065f46">Patterns  (compose components)</text>
  <!-- Pattern boxes -->
  <rect x="40" y="103" width="130" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="105" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Login Form</text>
  <rect x="185" y="103" width="130" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="250" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Settings Panel</text>
  <rect x="330" y="103" width="130" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="395" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Data Table</text>
  <rect x="475" y="103" width="130" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="540" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Onboarding Flow</text>
  <rect x="620" y="103" width="140" height="28" rx="5" fill="#10b981" opacity="0.2" stroke="#10b981" stroke-width="1"/>
  <text x="690" y="122" text-anchor="middle" font-size="10" font-weight="600" fill="#065f46">Notification Center</text>

  <!-- Arrows between layers -->
  <line x1="400" y1="140" x2="400" y2="155" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#grayarrow)"/>
  <line x1="400" y1="225" x2="400" y2="240" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#grayarrow)"/>

  <!-- Side label -->
  <text x="10" y="200" text-anchor="middle" font-size="10" fill="#94a3b8" transform="rotate(-90 10 200)">Abstraction Level</text>

  <defs>
    <marker id="grayarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
