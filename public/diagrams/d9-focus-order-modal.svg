<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <defs>
    <marker id="arrowTab" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
    <marker id="arrowTabGreen" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#22c55e"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="34" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">Focus Order + Modal Focus Trap</text>

  <!-- ===== Left: Page Focus Order ===== -->
  <text x="190" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Page Focus Order</text>

  <!-- Item 1: Nav link -->
  <rect x="50" y="78" width="280" height="40" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="76" cy="98" r="13" fill="#3b82f6"/>
  <text x="76" y="103" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">1</text>
  <text x="220" y="103" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">Nav link (Home)</text>

  <!-- Tab arrow 1→2 -->
  <line x1="190" y1="118" x2="190" y2="134" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowTab)"/>
  <text x="220" y="130" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Tab</text>

  <!-- Item 2: Nav link -->
  <rect x="50" y="138" width="280" height="40" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="76" cy="158" r="13" fill="#3b82f6"/>
  <text x="76" y="163" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">2</text>
  <text x="220" y="163" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">Nav link (About)</text>

  <!-- Tab arrow 2→3 -->
  <line x1="190" y1="178" x2="190" y2="194" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowTab)"/>
  <text x="220" y="190" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Tab</text>

  <!-- Item 3: Button -->
  <rect x="50" y="198" width="280" height="40" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="76" cy="218" r="13" fill="#3b82f6"/>
  <text x="76" y="223" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">3</text>
  <text x="220" y="223" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">Open Modal button</text>

  <!-- Tab arrow 3→4 -->
  <line x1="190" y1="238" x2="190" y2="254" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowTab)"/>
  <text x="220" y="250" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Tab</text>

  <!-- Item 4: Input -->
  <rect x="50" y="258" width="280" height="40" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="76" cy="278" r="13" fill="#3b82f6"/>
  <text x="76" y="283" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">4</text>
  <text x="220" y="283" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">Form input (name)</text>

  <!-- Tab arrow 4→5 -->
  <line x1="190" y1="298" x2="190" y2="314" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrowTab)"/>
  <text x="220" y="310" font-family="system-ui, sans-serif" font-size="10" fill="#3b82f6">Tab</text>

  <!-- Item 5: Submit button -->
  <rect x="50" y="318" width="280" height="40" rx="8" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="76" cy="338" r="13" fill="#3b82f6"/>
  <text x="76" y="343" font-family="system-ui, sans-serif" font-size="12" font-weight="700" fill="#ffffff" text-anchor="middle">5</text>
  <text x="220" y="343" font-family="system-ui, sans-serif" font-size="13" fill="#1e293b" text-anchor="middle">Submit button</text>

  <!-- Divider -->
  <line x1="390" y1="56" x2="390" y2="380" stroke="#e2e8f0" stroke-width="2"/>

  <!-- ===== Right: Modal Focus Trap ===== -->
  <text x="600" y="62" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Modal Focus Trap</text>

  <!-- Modal box -->
  <rect x="430" y="80" width="340" height="250" rx="14" fill="#ffffff" stroke="#1e293b" stroke-width="2.5"/>
  <!-- Modal header -->
  <rect x="430" y="80" width="340" height="44" rx="14" fill="#1e293b"/>
  <rect x="430" y="104" width="340" height="20" fill="#1e293b"/>
  <text x="590" y="108" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">Dialog</text>
  <!-- Close button -->
  <circle cx="748" cy="102" r="14" fill="#ef4444"/>
  <text x="748" y="107" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#ffffff" text-anchor="middle">×</text>

  <!-- Focusable element A -->
  <rect x="460" y="142" width="280" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="484" cy="162" r="12" fill="#22c55e"/>
  <text x="484" y="167" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">A</text>
  <text x="610" y="167" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Input field</text>

  <!-- Focusable element B -->
  <rect x="460" y="196" width="280" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="484" cy="216" r="12" fill="#22c55e"/>
  <text x="484" y="221" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">B</text>
  <text x="610" y="221" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Confirm button</text>

  <!-- Focusable element C (close × button reference) -->
  <rect x="460" y="250" width="280" height="40" rx="8" fill="#dcfce7" stroke="#22c55e" stroke-width="2"/>
  <circle cx="484" cy="270" r="12" fill="#22c55e"/>
  <text x="484" y="275" font-family="system-ui, sans-serif" font-size="11" font-weight="700" fill="#ffffff" text-anchor="middle">C</text>
  <text x="610" y="275" font-family="system-ui, sans-serif" font-size="12" fill="#1e293b" text-anchor="middle">Close × button</text>

  <!-- Circular Tab arrow (A→B→C→A) -->
  <path d="M 750 162 Q 800 206 750 250" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrowTabGreen)"/>
  <path d="M 750 250 Q 810 316 600 316 Q 430 316 430 216 Q 430 156 462 156" stroke="#22c55e" stroke-width="2.5" fill="none" marker-end="url(#arrowTabGreen)"/>

  <text x="600" y="348" font-family="system-ui, sans-serif" font-size="12" font-weight="600" fill="#22c55e" text-anchor="middle">Focus trapped inside modal</text>
  <text x="600" y="366" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">Tab cycles A → B → C → A (no escape)</text>
</svg>
