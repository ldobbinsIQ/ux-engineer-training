<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 220" font-family="system-ui, -apple-system, sans-serif">
  <!-- Background -->
  <rect width="800" height="220" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">Browser Rendering Pipeline</text>

  <!-- Step boxes -->
  <!-- HTML -->
  <rect x="20" y="60" width="100" height="52" rx="8" fill="#3b82f6" opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="70" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#1d4ed8">HTML</text>
  <text x="70" y="98" text-anchor="middle" font-size="10" fill="#1d4ed8">Source File</text>

  <!-- Arrow -->
  <line x1="120" y1="86" x2="148" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- DOM -->
  <rect x="150" y="60" width="100" height="52" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="200" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#6d28d9">DOM</text>
  <text x="200" y="98" text-anchor="middle" font-size="10" fill="#6d28d9">Node Tree</text>

  <!-- CSS source -->
  <rect x="150" y="130" width="100" height="52" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="200" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">CSS</text>
  <text x="200" y="168" text-anchor="middle" font-size="10" fill="#b45309">Source File</text>

  <!-- CSSOM arrow from CSS -->
  <line x1="250" y1="156" x2="278" y2="156" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- CSSOM -->
  <rect x="280" y="130" width="100" height="52" rx="8" fill="#f59e0b" opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="330" y="152" text-anchor="middle" font-size="11" font-weight="600" fill="#b45309">CSSOM</text>
  <text x="330" y="168" text-anchor="middle" font-size="10" fill="#b45309">Style Rules</text>

  <!-- DOM arrow to Render Tree -->
  <line x1="250" y1="86" x2="278" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Render Tree -->
  <rect x="280" y="60" width="110" height="52" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="335" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Render</text>
  <text x="335" y="98" text-anchor="middle" font-size="10" fill="#065f46">Tree</text>

  <!-- CSSOM merges into Render Tree -->
  <path d="M330 130 Q330 110 335 112" stroke="#94a3b8" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow -->
  <line x1="390" y1="86" x2="418" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Layout -->
  <rect x="420" y="60" width="100" height="52" rx="8" fill="#ec4899" opacity="0.15" stroke="#ec4899" stroke-width="1.5"/>
  <text x="470" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#9d174d">Layout</text>
  <text x="470" y="98" text-anchor="middle" font-size="10" fill="#9d174d">Size + Position</text>

  <!-- Arrow -->
  <line x1="520" y1="86" x2="548" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Paint -->
  <rect x="550" y="60" width="100" height="52" rx="8" fill="#ef4444" opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
  <text x="600" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#991b1b">Paint</text>
  <text x="600" y="98" text-anchor="middle" font-size="10" fill="#991b1b">Pixels to Screen</text>

  <!-- Arrow -->
  <line x1="650" y1="86" x2="678" y2="86" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- Composite -->
  <rect x="680" y="60" width="100" height="52" rx="8" fill="#14b8a6" opacity="0.15" stroke="#14b8a6" stroke-width="1.5"/>
  <text x="730" y="82" text-anchor="middle" font-size="11" font-weight="600" fill="#0f766e">Composite</text>
  <text x="730" y="98" text-anchor="middle" font-size="10" fill="#0f766e">GPU Layers</text>

  <!-- Caption -->
  <text x="400" y="200" text-anchor="middle" font-size="11" fill="#64748b">CSS changes that trigger Layout are most expensive (reflow). Paint-only changes are cheaper. Composite-only (opacity, transform) are fastest.</text>

  <!-- Arrow marker -->
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#94a3b8"/>
    </marker>
  </defs>
</svg>
