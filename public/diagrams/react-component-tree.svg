<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 340" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="340" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">React Component Tree: Props Flow Down, Events Bubble Up</text>

  <!-- App (root) -->
  <rect x="325" y="50" width="150" height="44" rx="8" fill="#3b82f6" opacity="0.2" stroke="#3b82f6" stroke-width="1.5"/>
  <text x="400" y="68" text-anchor="middle" font-size="12" font-weight="700" fill="#1d4ed8">App</text>
  <text x="400" y="84" text-anchor="middle" font-size="10" fill="#1d4ed8">state: user, theme</text>

  <!-- Props arrows down -->
  <line x1="360" y1="94" x2="280" y2="128" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="440" y1="94" x2="520" y2="128" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Sidebar -->
  <rect x="180" y="130" width="140" height="44" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="250" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">Sidebar</text>
  <text x="250" y="164" text-anchor="middle" font-size="10" fill="#6d28d9">props: user</text>

  <!-- Dashboard -->
  <rect x="460" y="130" width="160" height="44" rx="8" fill="#8b5cf6" opacity="0.15" stroke="#8b5cf6" stroke-width="1.5"/>
  <text x="540" y="148" text-anchor="middle" font-size="12" font-weight="700" fill="#6d28d9">Dashboard</text>
  <text x="540" y="164" text-anchor="middle" font-size="10" fill="#6d28d9">props: theme, user</text>

  <!-- Props arrows down from Sidebar -->
  <line x1="230" y1="174" x2="185" y2="210" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="270" y1="174" x2="315" y2="210" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- Props arrows down from Dashboard -->
  <line x1="510" y1="174" x2="470" y2="210" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <line x1="570" y1="174" x2="610" y2="210" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="4,2"/>

  <!-- NavItem -->
  <rect x="110" y="212" width="120" height="40" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="170" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">NavItem</text>
  <text x="170" y="244" text-anchor="middle" font-size="10" fill="#065f46">props: label, href</text>

  <!-- Avatar -->
  <rect x="260" y="212" width="120" height="40" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="320" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Avatar</text>
  <text x="320" y="244" text-anchor="middle" font-size="10" fill="#065f46">props: user.name</text>

  <!-- StatCard -->
  <rect x="400" y="212" width="120" height="40" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="460" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">StatCard</text>
  <text x="460" y="244" text-anchor="middle" font-size="10" fill="#065f46">props: value, label</text>

  <!-- Chart -->
  <rect x="550" y="212" width="120" height="40" rx="8" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="610" y="228" text-anchor="middle" font-size="11" font-weight="600" fill="#065f46">Chart</text>
  <text x="610" y="244" text-anchor="middle" font-size="10" fill="#065f46">props: data</text>

  <!-- Event bubble up arrow -->
  <path d="M460 252 Q460 275 440 280 Q400 285 400 275 Q400 200 400 174" stroke="#ef4444" stroke-width="1.5" fill="none" marker-end="url(#redarrow)" stroke-dasharray="3,3"/>
  <text x="472" y="278" font-size="10" fill="#ef4444">onClick callback</text>
  <text x="472" y="290" font-size="10" fill="#ef4444">bubbles up via props</text>

  <!-- Legend -->
  <rect x="30" y="300" width="12" height="2" fill="#3b82f6" opacity="0.7"/>
  <line x1="30" y1="301" x2="42" y2="301" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="48" y="305" font-size="10" fill="#64748b">Props flow down (parent → child)</text>
  <line x1="220" y1="301" x2="232" y2="301" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="3,3"/>
  <text x="238" y="305" font-size="10" fill="#64748b">Events/callbacks flow up (child → parent)</text>

  <defs>
    <marker id="redarrow" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#ef4444"/>
    </marker>
  </defs>
</svg>
