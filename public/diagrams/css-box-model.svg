<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" font-family="system-ui, -apple-system, sans-serif">
  <rect width="800" height="320" fill="#fafafa" rx="12"/>

  <!-- Title -->
  <text x="400" y="28" text-anchor="middle" font-size="14" font-weight="600" fill="#111">The CSS Box Model</text>

  <!-- Margin (outermost) -->
  <rect x="80" y="50" width="640" height="230" rx="4" fill="#f59e0b" opacity="0.12" stroke="#f59e0b" stroke-width="1.5"/>
  <text x="110" y="70" font-size="11" font-weight="600" fill="#b45309">margin</text>
  <text x="110" y="84" font-size="10" fill="#b45309">Space outside the border — separates elements from each other</text>

  <!-- Border -->
  <rect x="130" y="95" width="540" height="155" rx="4" fill="none" stroke="#64748b" stroke-width="2"/>
  <text x="150" y="113" font-size="11" font-weight="600" fill="#475569">border</text>

  <!-- Padding -->
  <rect x="155" y="120" width="490" height="105" rx="4" fill="#3b82f6" opacity="0.08" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="4,2"/>
  <text x="175" y="138" font-size="11" font-weight="600" fill="#1d4ed8">padding</text>
  <text x="175" y="152" font-size="10" fill="#1d4ed8">Space inside the border — pushes content away from edge</text>

  <!-- Content -->
  <rect x="200" y="160" width="400" height="45" rx="4" fill="#10b981" opacity="0.15" stroke="#10b981" stroke-width="1.5"/>
  <text x="400" y="178" text-anchor="middle" font-size="12" font-weight="700" fill="#065f46">Content Area</text>
  <text x="400" y="196" text-anchor="middle" font-size="10" fill="#065f46">width × height  (or auto-sized by content)</text>

  <!-- Dimension annotations -->
  <text x="400" y="295" text-anchor="middle" font-size="11" fill="#475569">box-sizing: content-box (default) → width = content only</text>
  <text x="400" y="310" text-anchor="middle" font-size="11" fill="#1d4ed8">box-sizing: border-box (recommended) → width = content + padding + border</text>
</svg>
