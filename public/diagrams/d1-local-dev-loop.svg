<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" width="800" height="400">
  <!-- Background -->
  <rect width="800" height="400" fill="#ffffff"/>

  <!-- Title -->
  <text x="400" y="36" font-family="system-ui, sans-serif" font-size="20" font-weight="700" fill="#1e293b" text-anchor="middle">Local Dev Loop</text>

  <!-- Node: Cursor (top-left) -->
  <rect x="60" y="80" width="160" height="60" rx="10" ry="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="107" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Cursor</text>
  <text x="140" y="126" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">editor</text>

  <!-- Node: Terminal (top-right) -->
  <rect x="580" y="80" width="160" height="60" rx="10" ry="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="660" y="107" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Terminal</text>
  <text x="660" y="126" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">npm run dev</text>

  <!-- Node: Dev Server (bottom-right) -->
  <rect x="580" y="270" width="160" height="60" rx="10" ry="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="660" y="297" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Dev Server</text>
  <text x="660" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">localhost:3000</text>

  <!-- Node: Browser (bottom-left) -->
  <rect x="60" y="270" width="160" height="60" rx="10" ry="10" fill="#f1f5f9" stroke="#3b82f6" stroke-width="2"/>
  <text x="140" y="297" font-family="system-ui, sans-serif" font-size="14" font-weight="700" fill="#1e293b" text-anchor="middle">Browser</text>
  <text x="140" y="316" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">hot reload</text>

  <!-- Arrow: Cursor → Terminal (top, left to right) -->
  <line x1="220" y1="110" x2="578" y2="110" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="100" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">save file</text>

  <!-- Arrow: Terminal → Dev Server (right side, top to bottom) -->
  <line x1="660" y1="140" x2="660" y2="268" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="700" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">auto-compile</text>

  <!-- Arrow: Dev Server → Browser (bottom, right to left) -->
  <line x1="580" y1="300" x2="222" y2="300" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="400" y="320" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">hot reload</text>

  <!-- Arrow: Browser → Cursor (left side, bottom to top) -->
  <line x1="140" y1="270" x2="140" y2="142" stroke="#3b82f6" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="88" y="210" font-family="system-ui, sans-serif" font-size="11" fill="#6b7280" text-anchor="middle">see change</text>

  <!-- Arrowhead marker -->
  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="9" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#3b82f6"/>
    </marker>
  </defs>
</svg>
